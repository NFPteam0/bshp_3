          $ref: '#/components/schemas/ModelStatuses'
        error_text:
          type: string
          title: Error Text
        fitting_start_date:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Fitting Start Date
        fitting_end_date:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Fitting End Date
        metrics:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          title: Metrics
      type: object
      required:
      - status
      - error_text
      - fitting_start_date
      - fitting_end_date
      - metrics
      title: ModelInfo
    ModelStatuses:
      type: string
      enum:
      - CREATED
      - FITTING
      - READY
      - ERROR
      title: ModelStatuses
    ModelTypes:
      type: string
      enum:
      - rf
      - catboost
      - fasttext
      - extfasttext
      - catboost+
      title: ModelTypes
    StatusResponse:
