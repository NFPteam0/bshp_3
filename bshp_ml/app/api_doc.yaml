openapi: 3.1.0
info:
  title: BSHP App
  version: 3.2.4.4
paths:
  /:
    get:
      summary: Main Page
      description: 'Root method returns html ok description

        @return: HTML response with ok micro html'
      operationId: main_page__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Health Health Get
  /version:
    get:
      summary: Version
      operationId: version_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Version Version Get
  /save_data:
    post:
      summary: Save Data
      operationId: save_data_save_data_post
      parameters:
      - name: base_name
        in: query
        required: true
        schema:
          type: string
          title: Base Name
      - name: replace
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Replace
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_save_data_save_data_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /delete_data:
    get:
      summary: Delete Data
      operationId: delete_data_delete_data_get
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Delete Data Delete Data Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/fit:
    post:
      summary: Fit
      operationId: fit_v1_fit_post
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: model_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelTypes'
          default: rf
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              title: Parameters
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /delete_model:
    get:
      summary: Delete Model
      operationId: delete_model_delete_model_get
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: model_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelTypes'
          default: catboost+
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Delete Model Delete Model Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /get_model_info:
    get:
      summary: Get Model Info
      operationId: get_model_info_get_model_info_get
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: model_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelTypes'
          default: rf
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/predict:
    post:
      summary: Predict (previous version)
      operationId: predict_v1_predict_post
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: model_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelTypes'
          default: rf
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DataRow'
              title: X
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataRow'
                title: Response Predict V1 Predict Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /get_task_status:
    get:
      summary: Get Task Status
      operationId: get_task_status_get_task_status_get
      parameters:
      - name: task_id
        in: query
        required: true
        schema:
          type: string
          title: Task Id
      - name: token
        in: header
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /fit:
    post:
      summary: Fit
      operationId: fit_fit_post
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: fit_embeddings
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Fit Embeddings
      - name: model_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelTypes'
          default: catboost+
      - name: token
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              title: Parameters
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /predict:
    post:
      summary: Predict
      operationId: predict_predict_post
      parameters:
      - name: base_name
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Base Name
      - name: model_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelTypes'
          default: catboost+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ExtDataRow'
              title: X
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
